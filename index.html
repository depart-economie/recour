<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>منصة الطعون في التوجيه</title>
  <style>
    :root{
      --primary:#1e3a8a; --secondary:#0f766e; --bg:#f3f6fb; --card:#ffffff; --text:#172033; --muted:#64748b; --danger:#dc2626;
    }
    *{box-sizing:border-box;font-family:"Tajawal","Segoe UI",Arial,sans-serif}
    body{margin:0;background:linear-gradient(135deg,#e0f2fe,#f8fafc 45%,#ecfeff);color:var(--text);min-height:100vh}
    .hero{padding:38px 18px 90px;background:linear-gradient(135deg,var(--primary),#2563eb,var(--secondary));color:white;text-align:center;border-bottom-left-radius:42px;border-bottom-right-radius:42px;box-shadow:0 15px 35px #1e3a8a33}
    .hero h1{margin:0;font-size:32px;font-weight:800}.hero p{margin:12px auto 0;max-width:820px;line-height:1.8;opacity:.95}
    .wrap{max-width:980px;margin:-60px auto 40px;padding:0 16px}
    .card{background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-radius:28px;padding:26px;box-shadow:0 18px 45px #0f172a24;border:1px solid #ffffff}
    .notice{background:#eff6ff;border:1px solid #bfdbfe;border-radius:18px;padding:14px 16px;margin-bottom:22px;color:#1e40af;line-height:1.7;text-align:center}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}.full{grid-column:1/-1}
    label{display:block;margin-bottom:7px;font-weight:700;color:#334155}.req{color:var(--danger)}
    input,select,textarea{width:100%;border:1px solid #cbd5e1;border-radius:15px;padding:13px 14px;font-size:15px;background:#fff;outline:none;transition:.2s}
    input:focus,select:focus,textarea:focus{border-color:#2563eb;box-shadow:0 0 0 4px #2563eb22} textarea{min-height:125px;resize:vertical;line-height:1.7}
    .actions{display:flex;gap:12px;align-items:center;margin-top:22px;flex-wrap:wrap}.btn{border:0;border-radius:16px;padding:14px 22px;font-weight:800;font-size:16px;cursor:pointer;transition:.2s}.primary{background:linear-gradient(135deg,#2563eb,#0f766e);color:white;box-shadow:0 10px 25px #2563eb40}.primary:hover{transform:translateY(-1px)}.ghost{background:#e2e8f0;color:#334155}
    .status{margin-top:16px;padding:13px 15px;border-radius:14px;display:none;line-height:1.7}.ok{display:block;background:#ecfdf5;color:#047857;border:1px solid #a7f3d0}.err{display:block;background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
    .footer{text-align:center;color:#64748b;font-size:13px;margin-top:18px}.hint{font-size:12px;color:#64748b;margin-top:5px}
    @media(max-width:720px){.grid{grid-template-columns:1fr}.hero h1{font-size:24px}.card{padding:18px;border-radius:22px}}
    .calc{background:linear-gradient(135deg,#f59e0b,#d97706);color:white;box-shadow:0 10px 20px rgba(217,119,6,.35)}
    .calc:hover{transform:translateY(-2px);box-shadow:0 15px 25px rgba(217,119,6,.45)}
  </style>
</head>
<body>
  <section class="hero">
    <h2>كلية العلوم الاقتصادية والتجارية وعلوم التسيير</h2>
    <h3>قسم العلوم الاقتصادية</h3>

    <h1>منصة تقديم الطعون على عملية التوجيه</h1>

    <p>
        برجى التأكد من صحة المعلومات المقدمة.
    </p>
</section>

  <main class="wrap">
    <div class="card">
      <div class="notice">عملية تقديم الطعون مفتوحة الى غاية يوم السبت 11 جويلية 2026 على الساعة مننصف الليل</div>

      <form id="appealForm">
        <div class="grid">
          <div><label>رقم التسجيل <span class="req">*</span></label><input name="registration" required placeholder="مثال: 2023456789"></div>
          <div><label>الاسم <span class="req">*</span></label><input name="firstName" required placeholder="اكتب الاسم"></div>
          <div><label>اللقب <span class="req">*</span></label><input name="lastName" required placeholder="اكتب اللقب"></div>
          <div><label>المستوى <span class="req">*</span></label><select name="cycle" id="cycle" required><option value="">اختر المستوى</option><option>ليسانس</option><option>ماستر</option></select></div>
          <div><label>التخصص الموجه إليه <span class="req">*</span></label><select name="assignedSpecialty" id="assignedSpecialty" required disabled><option value="">اختر المستوى أولاً</option></select></div>
          <div><label>التخصص المرغوب <span class="req">*</span></label><select name="desiredSpecialty" id="desiredSpecialty" required disabled><option value="">اختر المستوى أولاً</option></select></div>
          <div><label>هل تم تعبئة بطاقة الرغبات؟ <span class="req">*</span></label><select name="wishCardFilled" required><option value="">اختر</option><option>نعم</option><option>لا</option></select></div>
          <div><label>رقم خيار التخصص الذي وُجّه إليه الطالب <span class="req">*</span></label><select name="assignedChoiceRank" required><option value="">اختر</option><option>الخيار الأول</option><option>الخيار الثاني</option><option>الخيار الثالث</option><option>الخيار الرابع</option><option>الخيار الخامس</option><option>لم يكن ضمن الاختيارات</option></select></div>
          <div class="full"><label>سبب الطعن <span class="req">*</span></label><textarea name="appealReason" required placeholder="اشرح سبب الطعن بوضوح..."></textarea></div>
        </div>
        <div class="actions">

    <button class="btn primary" type="submit" id="submitBtn">
         إرسال الطعن
    </button>

    <button class="btn ghost" type="reset">
         مسح البيانات
    </button>

    <button class="btn calc" type="button"
            onclick="window.location.href='calcul_moyenne_classement.html';">
         حساب المعدل الترتيبي
    </button>

</div>
        <div id="status" class="status"></div>
      </form>
    </div>
    <div class="footer">© منصة الطعون — قسم العلوم الاقتصادية</div>
  </main>

  <script>
    // ضع هنا رابط Google Apps Script Web App بعد النشر
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz3rSjLuc71PGV4JAcI0i-x1qgzxw8JMIatYpwLTSSj10b6T2A1FqRoBfGlZJwdewkm/exec";


    const specialtiesByCycle = {
      "ليسانس": [
        "اقتصاد كمي واحصاء",
        "اقتصاد وتسيير مؤسسات",
        "اقتصاد رقمي و تحليل البيانات",
        "اقتصاد مالي ونقدي",
        "اقتصاد دولي"
      ],
      "ماستر": [
        "اقتصاد كمي واحصاء",
        "اقتصاد وتسيير مؤسسات",
        "اقتصاد مالي ونقدي",
        "اقتصاد دولي",
        "اقتصاد دائري",
        "ذكاء اقتصادي وتحليل البيانات"
      ]
    };

    const cycleSelect = document.getElementById('cycle');
    const assignedSpecialty = document.getElementById('assignedSpecialty');
    const desiredSpecialty = document.getElementById('desiredSpecialty');

    function fillSpecialtySelect(selectElement, cycle){
      selectElement.innerHTML = '';
      if(!cycle || !specialtiesByCycle[cycle]){
        selectElement.disabled = true;
        selectElement.innerHTML = '<option value="">اختر المستوى أولاً</option>';
        return;
      }
      selectElement.disabled = false;
      selectElement.innerHTML = '<option value="">اختر التخصص</option>';
      specialtiesByCycle[cycle].forEach(spec => {
        const opt = document.createElement('option');
        opt.value = spec;
        opt.textContent = spec;
        selectElement.appendChild(opt);
      });
    }

    cycleSelect.addEventListener('change', function(){
      fillSpecialtySelect(assignedSpecialty, this.value);
      fillSpecialtySelect(desiredSpecialty, this.value);
    });

    const form = document.getElementById('appealForm');
    const statusBox = document.getElementById('status');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async function(e){
      e.preventDefault();
      statusBox.className = 'status'; statusBox.textContent = '';
      if(!SCRIPT_URL || SCRIPT_URL.includes('PUT_YOUR')){
        statusBox.className = 'status err';
        statusBox.textContent = 'يجب أولاً وضع رابط Google Apps Script داخل الكود مكان SCRIPT_URL.';
        return;
      }
      submitBtn.disabled = true; submitBtn.textContent = 'جاري الإرسال...';
      const data = Object.fromEntries(new FormData(form).entries());
      data.createdAt = new Date().toLocaleString('ar-DZ');
      try{
        const res = await fetch(SCRIPT_URL, {method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data)});
        statusBox.className = 'status ok';
        statusBox.textContent = 'تم إرسال الطعن بنجاح. احتفظ برقم تسجيلك للمتابعة.';
        form.reset();
      }catch(err){
        statusBox.className = 'status err';
        statusBox.textContent = 'تعذر إرسال الطعن. تحقق من الاتصال أو رابط Google Apps Script.';
      }finally{
        submitBtn.disabled = false; submitBtn.textContent = 'إرسال الطعن';
      }
    });
  </script>

</body>
</html>
