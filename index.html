<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>منصة تقديم الطعون</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root{
      --bg:#eef3fb;--panel:#ffffff;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;
      --primary:#1d4ed8;--primary2:#2563eb;--green:#059669;--orange:#d97706;--dark:#334155;
      --soft:#f8fafc;--shadow:0 18px 45px rgba(15,23,42,.10);--radius:18px
    }
    *{box-sizing:border-box}
    body{font-family:Tahoma,Arial,sans-serif;background:radial-gradient(circle at top right,#dbeafe,transparent 35%),linear-gradient(180deg,#eef3fb,#f8fafc);margin:0;color:var(--ink)}
    .page{max-width:1320px;margin:auto;padding:28px}
    .hero{background:linear-gradient(135deg,#0f172a,#1d4ed8);color:white;border-radius:24px;padding:26px;box-shadow:var(--shadow);position:relative;overflow:hidden}
    .hero:after{content:"";position:absolute;left:-80px;top:-80px;width:260px;height:260px;background:rgba(255,255,255,.10);border-radius:50%}
    h1{font-size:29px;margin:0 0 10px;text-align: center;}.subtitle{color:#dbeafe;line-height:1.9;margin:0;max-width:980px}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-top:18px;box-shadow:0 10px 28px rgba(15,23,42,.06)}
    .grid{display:grid;grid-template-columns:1.2fr .8fr;gap:18px}.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .upload{border:2px dashed #93c5fd;background:#eff6ff;border-radius:18px;padding:18px;min-height:104px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
    .upload strong{display:block;font-size:18px;margin-bottom:6px}.hint{color:var(--muted);font-size:13px;line-height:1.7}
    input,button{font-family:inherit;font-size:15px} input[type=file]{padding:12px;background:white;border:1px solid #bfdbfe;border-radius:12px;max-width:100%}
    button{border:0;border-radius:12px;padding:11px 16px;background:var(--primary2);color:white;cursor:pointer;box-shadow:0 8px 18px rgba(37,99,235,.18);transition:.15s}
    button:hover{transform:translateY(-1px);filter:brightness(1.02)} button:disabled{background:#94a3b8;cursor:not-allowed;box-shadow:none;transform:none}
    .green{background:var(--green)}.orange{background:var(--orange)}.gray{background:var(--dark)}
    .steps{display:grid;gap:10px}.step{display:flex;gap:10px;align-items:flex-start;padding:12px;background:var(--soft);border:1px solid var(--line);border-radius:14px;color:#334155;line-height:1.6}
    .badge{background:#dbeafe;color:#1e40af;border-radius:999px;min-width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;font-weight:bold}
    .sectionTitle{font-size:20px;margin:0 0 12px;display:flex;align-items:center;gap:8px}.sectionTitle:before{content:"";width:8px;height:24px;border-radius:8px;background:var(--primary2)}
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px;margin-top:10px}
    .card{background:linear-gradient(180deg,#fff,#f8fafc);border:1px solid var(--line);border-radius:16px;padding:15px;line-height:1.8;position:relative;overflow:hidden}
    .card:before{content:"";position:absolute;right:0;top:0;width:100%;height:4px;background:#2563eb}.card b{display:block;font-size:18px;margin-top:2px}.small{font-size:12px;color:var(--muted)}
    .toolbar{padding:14px;border:1px solid var(--line);background:var(--soft);border-radius:16px}.toolbar b{display:block;margin-bottom:8px}
    .tableBox{overflow:auto;max-height:620px;border:1px solid var(--line);border-radius:16px;background:white;margin-top:14px}
    table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;min-width:980px} th,td{border-bottom:1px solid var(--line);padding:10px;text-align:right;white-space:nowrap}
    th{background:#0f172a;color:white;position:sticky;top:0;z-index:1} tr:nth-child(even){background:#f8fafc} tr:hover{background:#eff6ff}
    .footerNote{color:var(--muted);font-size:12px;text-align:center;margin:18px 0 0}
    @media(max-width:900px){.page{padding:14px}.grid{grid-template-columns:1fr}h1{font-size:23px}.hero{padding:20px}.upload{align-items:flex-start}}
    @media print{body{background:white}.hero,.upload,.toolbar button,input,.steps{display:none}.panel{box-shadow:none;border:0}.tableBox{max-height:none;overflow:visible}}
  </style>
</head>
<body>
<div class="page">
  <section class="hero">
    <h1> منصة تقديم الطعون</h1>
    <p class="subtitle"></p>
  </section>
<div class="page">
  <section class="hero">
    <h1> على الساعة السابعة</h1>
    <p class="subtitle"></p>
  </section>
</section>
</body>
</html>
