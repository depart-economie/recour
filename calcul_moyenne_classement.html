<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>حساب المعدل الترتيبي</title>
  <style>
    * { box-sizing: border-box; font-family: 'Tahoma', Arial, sans-serif; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #0b2c55, #eef4fb);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 25px;
      color: #102a43;
    }
    .card {
      width: 100%;
      max-width: 760px;
      background: rgba(255,255,255,0.96);
      border-radius: 22px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.22);
      padding: 28px;
      border-top: 8px solid #b99345;
    }
    h1 { text-align: center; color: #0b2c55; margin: 0 0 8px; }
    .subtitle { text-align: center; color: #6b7280; margin-bottom: 24px; line-height: 1.8; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    label { font-weight: bold; color: #0b2c55; display: block; margin-bottom: 8px; }
    input {
      width: 100%; padding: 13px; border: 1px solid #cbd5e1; border-radius: 12px;
      font-size: 16px; outline: none; background: #f8fafc;
    }
    input:focus { border-color: #0b2c55; background: #fff; }
    button {
      width: 100%; margin-top: 20px; border: none; border-radius: 14px;
      padding: 15px; font-size: 18px; font-weight: bold; cursor: pointer;
      background: linear-gradient(135deg, #0b2c55, #164f8f); color: white;
    }
    button:hover { opacity: 0.94; }
    .result {
      display: none; margin-top: 22px; padding: 22px; border-radius: 18px;
      background: #f1f7ff; border: 1px solid #cfe2ff; text-align: center;
    }
    .result strong { font-size: 38px; color: #0b2c55; display: block; margin: 8px 0; }
    .formula {
      margin-top: 20px; padding: 15px; background: #fff8e7; border-right: 5px solid #b99345;
      border-radius: 12px; line-height: 1.9; color: #4b5563;
    }
    .error { color: #b91c1c; text-align: center; margin-top: 12px; font-weight: bold; }
    @media (max-width: 650px) { .grid { grid-template-columns: 1fr; } }
    .top-actions{
    display:flex;
    justify-content:flex-start;
    margin-bottom:20px;
}

.back-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    text-decoration:none;
    background:linear-gradient(135deg,#2563eb,#0b2c55);
    color:#fff;
    padding:12px 18px;
    border-radius:12px;
    font-weight:bold;
    transition:.3s;
    box-shadow:0 8px 18px rgba(37,99,235,.30);
}

.back-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 25px rgba(37,99,235,.40);
}

.back-btn span{
    font-size:20px;
}

  </style>
</head>
<body>
  <main class="card">
    <div class="top-actions">
    <a href="index.html" class="back-btn">
        <span>⬅️</span>
        الرجوع إلى منصة الطعون
    </a>
</div>
    <h1>برنامج حساب المعدل الترتيبي</h1>
    <p class="subtitle">أدخل ما يلي: .</p>

    <div class="grid">
      <div>
        <label for="mse">معدل السداسيات الاربعة</label>
        <input id="mse" type="number" step="0.01" placeholder="مثال: 10.88">
      </div>
      <div>
        <label for="r">عدد مرات إعادة السنة</label>
        <input id="r" type="number" min="0" step="1" value="0">
      </div>
      <div>
        <label for="s">عدد مرات الدخول إلى الاستدراكي</label>
        <input id="s" type="number" min="0" step="1" value="0">
      </div>
      <div>
        <label for="d">عدد مرات الانتقال بالديون</label>
        <input id="d" type="number" min="0" step="1" value="0">
      </div>
      <div>
        <label for="a">نسبة التخفيض a</label>
        <input id="a" type="number" step="0.01" value="0.04">
      </div>
    </div>

    <button onclick="calculer()">احسب المعدل الترتيبي</button>
    <div id="error" class="error"></div>

    <div id="result" class="result">
      <div>المعدل الترتيبي هو:</div>
      <strong id="mc">0.00</strong>
      <div id="details"></div>
    </div>

    <div class="formula">
      <b>الصيغة المستعملة:</b><br>
      MC = MSE × [1 - a × (r + d/2 + s/4)]<br>
      حيث: r = عدد مرات إعادة السنة، d = عدد مرات الانتقال بالديون، s = عدد مرات الاستدراكي، a = نسبة التخفيض.
    </div>
  </main>

<script>
function parseValue(id) {
  const value = document.getElementById(id).value.replace(',', '.');
  return Number(value);
}

function calculer() {
  const mse = parseValue('mse');
  const r = parseValue('r');
  const s = parseValue('s');
  const d = parseValue('d');
  const a = parseValue('a');

  const error = document.getElementById('error');
  const result = document.getElementById('result');
  error.textContent = '';
  result.style.display = 'none';

  if (isNaN(mse) || mse < 0 || mse > 20) {
    error.textContent = 'يرجى إدخال معدل صحيح بين 0 و 20.';
    return;
  }
  if ([r, s, d, a].some(v => isNaN(v) || v < 0)) {
    error.textContent = 'يرجى إدخال أرقام صحيحة وموجبة في باقي الخانات.';
    return;
  }

  const coefficient = r + (d / 2) + (s / 4);
  const reduction = a * coefficient;
  let mc = mse * (1 - reduction);
  if (mc < 0) mc = 0;

  document.getElementById('mc').textContent = mc.toFixed(2).replace('.', ',');
  document.getElementById('details').innerHTML =
    'معامل التخفيض المحتسب: ' + coefficient.toFixed(2).replace('.', ',') +
    ' | نسبة الخصم من المعدل: ' + (reduction * 100).toFixed(2).replace('.', ',') + '%';
  result.style.display = 'block';
}
</script>
</body>
</html>
